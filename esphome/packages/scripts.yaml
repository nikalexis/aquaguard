esphome:
  on_boot:
    priority: 700
    then:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
          brightness: 40%

script:
  - id: update_status_led
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(ethernet_connected) && id(sntp_synced);
          then:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 100%
                blue: 0%
                brightness: 60%
          else:
            - light.turn_on:
                id: status_led
                red: 0%
                green: 0%
                blue: 100%
                brightness: 40%
