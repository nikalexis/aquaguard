globals:
  - id: zone_${zone}_consumption_l_value
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: zone_${zone}_limit_l_value
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: zone_${zone}_limit_active_value
    type: bool
    restore_value: true
    initial_value: "false"

  - id: zone_${zone}_admin_stop_value
    type: bool
    restore_value: true
    initial_value: "false"

  - id: zone_${zone}_last_pulse_epoch
    type: uint32_t
    restore_value: true
    initial_value: "0"

text:
  - platform: template
    id: zone_${zone}_name
    name: "Zone ${zone} Name"
    optimistic: true
    restore_value: true
    initial_value: "${default_zone_name}"
    min_length: 1
    max_length: 48
    mode: text
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 0

number:
  - platform: template
    id: zone_${zone}_consumption_l
    name: "Zone ${zone} Consumption"
    unit_of_measurement: "L"
    icon: "mdi:counter"
    min_value: 0
    max_value: 100000000
    step: 1
    mode: box
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 10
    lambda: |-
      return id(zone_${zone}_consumption_l_value);
    set_action:
      - lambda: |-
          id(zone_${zone}_consumption_l_value) = x;
          id(zone_${zone}_consumption_l).publish_state(x);
      - component.update: zone_${zone}_last_pulse_age
      - script.execute: zone_${zone}_apply_state

  - platform: template
    id: zone_${zone}_limit_l
    name: "Zone ${zone} Limit"
    unit_of_measurement: "L"
    icon: "mdi:water-alert"
    min_value: 0
    max_value: 100000000
    step: 1
    mode: box
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 20
    lambda: |-
      return id(zone_${zone}_limit_l_value);
    set_action:
      - lambda: |-
          id(zone_${zone}_limit_l_value) = x;
          id(zone_${zone}_limit_l).publish_state(x);
      - script.execute: zone_${zone}_apply_state

switch:
  - platform: gpio
    id: zone_${zone}_relay
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      pca9554: relay_expander
      number: ${relay_pin}
      mode:
        output: true
      inverted: false

  - platform: template
    id: zone_${zone}_limit_active
    name: "Zone ${zone} Limit Active"
    icon: "mdi:water-check"
    restore_mode: DISABLED
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 30
    lambda: |-
      return id(zone_${zone}_limit_active_value);
    turn_on_action:
      - lambda: |-
          id(zone_${zone}_limit_active_value) = true;
          id(zone_${zone}_limit_active).publish_state(true);
      - script.execute: zone_${zone}_apply_state
    turn_off_action:
      - lambda: |-
          id(zone_${zone}_limit_active_value) = false;
          id(zone_${zone}_limit_active).publish_state(false);
      - script.execute: zone_${zone}_apply_state

  - platform: template
    id: zone_${zone}_admin_stop
    name: "Zone ${zone} Admin Stop"
    icon: "mdi:water-off"
    restore_mode: DISABLED
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 40
    lambda: |-
      return id(zone_${zone}_admin_stop_value);
    turn_on_action:
      - lambda: |-
          id(zone_${zone}_admin_stop_value) = true;
          id(zone_${zone}_admin_stop).publish_state(true);
      - script.execute: zone_${zone}_apply_state
    turn_off_action:
      - lambda: |-
          id(zone_${zone}_admin_stop_value) = false;
          id(zone_${zone}_admin_stop).publish_state(false);
      - script.execute: zone_${zone}_apply_state

binary_sensor:
  - platform: gpio
    id: zone_${zone}_pulse_input
    internal: true
    use_interrupt: false
    pin:
      number: ${di_pin}
      mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    filters:
      - delayed_on_off: 10ms
    on_press:
      then:
        - lambda: |-
            id(zone_${zone}_consumption_l_value) += 1.0f;
            id(zone_${zone}_consumption_l).publish_state(id(zone_${zone}_consumption_l_value));

            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              id(zone_${zone}_last_pulse_epoch) = now.timestamp;
            }
        - component.update: zone_${zone}_last_pulse_age
        - component.update: zone_${zone}_last_pulse_timestamp
        - script.execute: zone_${zone}_apply_state

  - platform: template
    id: zone_${zone}_limit_exceeded
    name: "Zone ${zone} Limit Exceeded"
    icon: "mdi:water-alert"
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 80
    lambda: |-
      return id(zone_${zone}_consumption_l_value) >= id(zone_${zone}_limit_l_value);

  - platform: template
    id: zone_${zone}_limit_stop
    name: "Zone ${zone} Limit Stop"
    icon: "mdi:water-remove"
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 70
    lambda: |-
      return id(zone_${zone}_limit_active_value) &&
             id(zone_${zone}_consumption_l_value) >= id(zone_${zone}_limit_l_value);

  - platform: template
    id: zone_${zone}_effective_stop
    name: "Zone ${zone} Effective Stop"
    icon: "mdi:valve-closed"
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 60
    lambda: |-
      const bool limit_stop = id(zone_${zone}_limit_active_value) &&
                              id(zone_${zone}_consumption_l_value) >= id(zone_${zone}_limit_l_value);
      return limit_stop || id(zone_${zone}_admin_stop_value);

  - platform: template
    id: zone_${zone}_water_allowed
    name: "Zone ${zone} Water Allowed"
    icon: "mdi:valve-open"
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 50
    lambda: |-
      const bool limit_stop = id(zone_${zone}_limit_active_value) &&
                              id(zone_${zone}_consumption_l_value) >= id(zone_${zone}_limit_l_value);
      return !(limit_stop || id(zone_${zone}_admin_stop_value));

sensor:
  - platform: pulse_meter
    id: zone_${zone}_flow_rate_ema_5m
    name: "Zone ${zone} Flow Rate EMA 5m"
    unit_of_measurement: "L/min"
    icon: "mdi:waves-arrow-right"
    accuracy_decimals: 2
    state_class: measurement
    internal_filter: 10ms
    internal_filter_mode: PULSE
    timeout: 5min
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 90
    pin:
      number: ${di_pin}
      mode: INPUT_PULLUP
      inverted: true
      allow_other_uses: true
    filters:
      - heartbeat: 10s
      - exponential_moving_average:
          alpha: 0.0645
          send_every: 1

  - platform: template
    id: zone_${zone}_last_pulse_age
    name: "Zone ${zone} Last Pulse Age"
    unit_of_measurement: "min"
    icon: "mdi:timer-outline"
    accuracy_decimals: 1
    update_interval: 30s
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 100
    lambda: |-
      const uint32_t last = id(zone_${zone}_last_pulse_epoch);
      auto now = id(sntp_time).now();
      if (last == 0 || !now.is_valid() || now.timestamp < last) {
        return NAN;
      }
      return (now.timestamp - last) / 60.0f;

text_sensor:
  - platform: template
    id: zone_${zone}_last_pulse_timestamp
    name: "Zone ${zone} Last Pulse Timestamp"
    icon: "mdi:clock-outline"
    update_interval: 60s
    web_server:
      sorting_group_id: zone_${zone}_group
      sorting_weight: 110
    lambda: |-
      const uint32_t last = id(zone_${zone}_last_pulse_epoch);
      if (last == 0) {
        return {};
      }

      char buffer[32];
      time_t raw = last;
      struct tm *timeinfo = localtime(&raw);
      if (timeinfo == nullptr) {
        return {};
      }
      strftime(buffer, sizeof(buffer), "%Y-%m-%d %H:%M:%S", timeinfo);
      return {buffer};

script:
  - id: zone_${zone}_publish_restored_state
    mode: restart
    then:
      - lambda: |-
          id(zone_${zone}_consumption_l).publish_state(id(zone_${zone}_consumption_l_value));
          id(zone_${zone}_limit_l).publish_state(id(zone_${zone}_limit_l_value));
          id(zone_${zone}_limit_active).publish_state(id(zone_${zone}_limit_active_value));
          id(zone_${zone}_admin_stop).publish_state(id(zone_${zone}_admin_stop_value));
      - component.update: zone_${zone}_last_pulse_age
      - component.update: zone_${zone}_last_pulse_timestamp
      - script.execute: zone_${zone}_apply_state

  - id: zone_${zone}_apply_state
    mode: restart
    then:
      - lambda: |-
          const bool limit_exceeded = id(zone_${zone}_consumption_l_value) >= id(zone_${zone}_limit_l_value);
          const bool limit_stop = id(zone_${zone}_limit_active_value) && limit_exceeded;
          const bool effective_stop = limit_stop || id(zone_${zone}_admin_stop_value);

          id(zone_${zone}_limit_exceeded).publish_state(limit_exceeded);
          id(zone_${zone}_limit_stop).publish_state(limit_stop);
          id(zone_${zone}_effective_stop).publish_state(effective_stop);
          id(zone_${zone}_water_allowed).publish_state(!effective_stop);

          if (effective_stop) {
            id(zone_${zone}_relay).turn_on();
          } else {
            id(zone_${zone}_relay).turn_off();
          }

esphome:
  on_boot:
    priority: -100
    then:
      - script.execute: zone_${zone}_publish_restored_state
