ethernet:
  type: W5500
  clk_pin: GPIO15
  mosi_pin: GPIO13
  miso_pin: GPIO14
  cs_pin: GPIO16
  interrupt_pin: GPIO12
  on_connect:
    then:
      - lambda: |-
          id(ethernet_connected) = true;
          id(ethernet_connected_status).publish_state(true);
      - script.execute: update_status_led
  on_disconnect:
    then:
      - lambda: |-
          id(ethernet_connected) = false;
          id(ethernet_connected_status).publish_state(false);
      - script.execute: update_status_led

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "Ethernet IP Address"
      id: ethernet_ip_address
      entity_category: diagnostic
    mac_address:
      name: "Ethernet MAC Address"
      id: ethernet_mac_address
      entity_category: diagnostic
